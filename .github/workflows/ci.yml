name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js (for JS syntax checks only — no build step)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JS syntax (src/runtime.js + chart-libs/*/chart.js)
        # runtime.js is include_str!'d straight into the binary — cargo
        # build happily compiles a syntax error in it, since it's just a
        # string literal as far as Rust is concerned. node --check is a
        # parse-only pass (doesn't execute the file), so this catches a
        # typo before it ships, without needing a browser or a real JS
        # test runner. Not run against assets/*.js — those are vendored,
        # already-minified third-party files, never hand-edited here.
        run: |
          for f in src/runtime.js chart-libs/*/chart.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: Install Rust (stable, with clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build (lib, bins, tests)
        run: cargo build --all-targets

      - name: Test (default suite — no live Postgres required)
        run: cargo test --lib

      - name: Test (Postgres-backed, otherwise #[ignore]d)
        # --test-threads=1: these tests share one database and each
        # truncates pgapp_control.{apps,workspaces} in its own setup,
        # so running them concurrently is a real race, not just slow —
        # confirmed locally (3 of 4 fail in parallel, all pass serial).
        env:
          PGAPP_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/pgapp_test
        run: cargo test --lib -- --ignored --test-threads=1

      - name: Clippy
        run: cargo clippy --all-targets
