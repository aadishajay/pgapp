name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, with clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build (lib, bins, tests)
        run: cargo build --all-targets

      - name: Test (default suite — no live Postgres required)
        run: cargo test --lib

      - name: Test (Postgres-backed, otherwise #[ignore]d)
        # --test-threads=1: these tests share one database and each
        # truncates pgapp_control.{apps,workspaces} in its own setup,
        # so running them concurrently is a real race, not just slow —
        # confirmed locally (3 of 4 fail in parallel, all pass serial).
        env:
          PGAPP_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/pgapp_test
        run: cargo test --lib -- --ignored --test-threads=1

      - name: Clippy
        run: cargo clippy --all-targets
